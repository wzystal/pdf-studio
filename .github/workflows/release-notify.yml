name: Release APK & DingTalk

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Decode signing keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Build Release APK
        env:
          RELEASE_KEYSTORE_PATH: release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Version tag
        id: ver
        run: echo "tag=release-$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Release ${{ steps.ver.outputs.tag }}
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to PGYER
        id: pgyer
        continue-on-error: true
        env:
          PGYER_API_KEY: ${{ secrets.PGYER_API_KEY }}
        run: |
          echo "skip=true" >> "$GITHUB_OUTPUT"
          if [[ -z "${PGYER_API_KEY}" ]]; then
            echo "PGYER_API_KEY 未配置，跳过蒲公英上传"
            exit 0
          fi
          chmod +x scripts/pgyer_upload.sh
          if INSTALL_URL=$(scripts/pgyer_upload.sh \
            -k "${PGYER_API_KEY}" \
            -d "Release ${{ steps.ver.outputs.tag }}" \
            app/build/outputs/apk/release/app-release.apk); then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "install_url=${INSTALL_URL}" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::蒲公英上传失败，钉钉将仅推送 GitHub Release 链接。请检查 PGYER_API_KEY 是否为蒲公英后台 API 信息页中的 API Key。"
            exit 0
          fi

      - name: Prepare release notes
        if: steps.gh_release.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/concise_release_notes.sh
          BODY=$(gh release view "${{ steps.ver.outputs.tag }}" --json body -q .body)
          printf '%s' "$BODY" | scripts/concise_release_notes.sh > /tmp/release_notes.txt

      - name: Notify DingTalk
        if: steps.gh_release.outcome == 'success'
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          APP_NAME: PDF 工坊
        run: |
          GITHUB_URL="https://github.com/${{ github.repository }}/releases/tag/${{ steps.ver.outputs.tag }}"
          PGYER_URL="${{ steps.pgyer.outputs.install_url }}"
          SKIP_PGYER="${{ steps.pgyer.outputs.skip }}"

          post_dingtalk() {
            local payload_file response
            payload_file=$(mktemp)
            cat > "$payload_file"
            response=$(curl -sS --fail-with-body --retry 3 --retry-all-errors \
              -X POST "$DINGTALK_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d @"$payload_file")
            rm -f "$payload_file"
            echo "$response"
            if ! echo "$response" | jq -e '.errcode == 0' >/dev/null; then
              echo "::error::钉钉推送失败: $response"
              exit 1
            fi
          }

          if [[ "$SKIP_PGYER" == "true" || -z "$PGYER_URL" ]]; then
            jq -n \
              --arg app "$APP_NAME" \
              --arg repo "${{ github.repository }}" \
              --arg tag "${{ steps.ver.outputs.tag }}" \
              --arg url "$GITHUB_URL" \
              --rawfile notes /tmp/release_notes.txt \
              '{
                msgtype: "markdown",
                markdown: {
                  title: "Release 构建成功",
                  text: ("### ✅ " + $app + " Release 新版本\n\n**仓库：** " + $repo + "\n\n**版本：** " + $tag + "\n\n**更新说明：**\n\n" + $notes + "\n\n[查看完整 Release 说明](" + $url + ")\n\n**下载：** [GitHub Release](" + $url + ")\n\n> 手机下载 app-release.apk 安装")
                }
              }' | post_dingtalk
          else
            jq -n \
              --arg app "$APP_NAME" \
              --arg repo "${{ github.repository }}" \
              --arg tag "${{ steps.ver.outputs.tag }}" \
              --arg release_url "$GITHUB_URL" \
              --arg pgyer_url "$PGYER_URL" \
              --rawfile notes /tmp/release_notes.txt \
              '{
                msgtype: "markdown",
                markdown: {
                  title: "Release 构建成功",
                  text: ("### ✅ " + $app + " Release 新版本\n\n**仓库：** " + $repo + "\n\n**版本：** " + $tag + "\n\n**更新说明：**\n\n" + $notes + "\n\n[查看完整 Release 说明](" + $release_url + ")\n\n**下载：** [蒲公英安装页](" + $pgyer_url + ")")
                }
              }' | post_dingtalk
          fi
